<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>班級登錄系統</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap');

:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #21262d;
  --border: #30363d;
  --text: #e6edf3;
  --text-muted: #7d8590;
  --red: #f85149;
  --red-dim: rgba(248,81,73,0.15);
  --green: #3fb950;
  --green-dim: rgba(63,185,80,0.15);
  --yellow: #d29922;
  --yellow-dim: rgba(210,153,34,0.12);
  --blue: #58a6ff;
  --blue-dim: rgba(88,166,255,0.12);
  --orange: #e8912d;
  --orange-dim: rgba(232,145,45,0.15);
  --radius: 12px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', sans-serif; min-height: 100vh; font-size: 15px; }

.topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 18px 12px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 50; }
.topbar-icon { width: 36px; height: 36px; background: var(--blue-dim); border: 1.5px solid var(--blue); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
.topbar-text h1 { font-size: 16px; font-weight: 900; letter-spacing: 1px; }
.topbar-text p  { font-size: 10px; color: var(--text-muted); margin-top: 1px; }

.page { display: none; padding: 18px 16px 90px; animation: fadeUp .22s ease; }
.page.active { display: block; }
@keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
.card-title { font-size: 11px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; }
.field { margin-bottom: 11px; }
.field label { display: block; font-size: 11px; font-weight: 600; color: var(--text-muted); letter-spacing: 1px; margin-bottom: 6px; }
select, input[type="text"], textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 13px; color: var(--text); font-family: 'Noto Sans TC', sans-serif; font-size: 14px; outline: none; appearance: none; -webkit-appearance: none; transition: border-color .15s; }
select:focus, input[type="text"]:focus, textarea:focus { border-color: var(--blue); }
textarea { resize: vertical; min-height: 80px; line-height: 1.6; }
.select-wrap { position: relative; }
.select-wrap::after { content:'▾'; position:absolute; right:12px; top:50%; transform:translateY(-50%); color:var(--text-muted); pointer-events:none; font-size:11px; }

.task-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.task-card { background: var(--surface2); border: 1.5px solid var(--border); border-radius: 10px; padding: 18px 12px; cursor: pointer; text-align: center; transition: all .15s; user-select: none; }
.task-card:active { transform: scale(.96); }
.task-card.sel-listen  { background: var(--orange-dim); border-color: var(--orange); }
.task-card.sel-absence { background: var(--red-dim);    border-color: var(--red); }
.task-icon { font-size: 28px; margin-bottom: 7px; }
.task-name { font-size: 14px; font-weight: 900; letter-spacing: 1px; }
.task-sub  { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
.task-card.sel-listen  .task-name { color: var(--orange); }
.task-card.sel-listen  .task-sub  { color: var(--orange); opacity: .7; }
.task-card.sel-absence .task-name { color: var(--red); }
.task-card.sel-absence .task-sub  { color: var(--red); opacity: .7; }

.listen-status-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.status-btn { padding: 14px 8px; border-radius: 9px; border: 1.5px solid var(--border); background: var(--surface2); color: var(--text-muted); font-family: 'Noto Sans TC', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; text-align: center; transition: all .15s; user-select: none; }
.status-btn:active { transform: scale(.96); }
.status-btn.sel-normal   { background: var(--green-dim); border-color: var(--green);  color: var(--green); }
.status-btn.sel-abnormal { background: var(--red-dim);   border-color: var(--red);    color: var(--red); }
.note-wrap { display: none; }
.note-wrap.show { display: block; }

.picker-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.picker-header span { font-size:11px; font-weight:700; letter-spacing:2px; color:var(--text-muted); text-transform:uppercase; }
.present-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); font-size:12px; padding:5px 12px; border-radius:6px; cursor:pointer; font-family:'Noto Sans TC',sans-serif; transition: all .15s; }
.present-btn.active { background:var(--green-dim); border-color:var(--green); color:var(--green); }
.seat-picker { display:grid; grid-template-columns:repeat(9,1fr); gap:5px; margin-bottom:10px; }
.seat-btn { aspect-ratio:1; border:1px solid var(--border); border-radius:7px; background:var(--surface2); color:var(--text-muted); font-family:'Space Mono',monospace; font-size:11px; font-weight:700; cursor:pointer; padding:0; display:flex; align-items:center; justify-content:center; transition: all .12s; user-select:none; }
.seat-btn:active { transform:scale(.85); }
.seat-btn.selected { background:var(--red-dim); border-color:var(--red); color:var(--red); }
.manual-row { display:flex; gap:8px; padding-top:10px; border-top:1px solid var(--border); align-items:center; }
.manual-row input { flex:1; font-family:'Space Mono',monospace; font-size:14px; letter-spacing:2px; }
.manual-add-btn { flex-shrink:0; background:var(--red); color:#fff; border:none; padding:10px 14px; border-radius:7px; font-family:'Noto Sans TC',sans-serif; font-size:13px; font-weight:700; cursor:pointer; white-space:nowrap; }
.manual-add-btn:active { opacity:.75; transform:scale(.96); }
.all-present-notice { background: var(--green-dim); border: 1px solid rgba(63,185,80,.4); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: var(--green); margin-bottom: 12px; display: none; }

.seat-summary { display:flex; flex-wrap:wrap; gap:6px; padding:2px 0; }
.seat-chip { background:var(--red-dim); border:1.5px solid var(--red); color:var(--red); font-family:'Space Mono',monospace; font-size:12px; font-weight:700; padding:4px 9px; border-radius:6px; display:flex; align-items:center; gap:5px; animation: pop .16s ease; }
@keyframes pop { from{transform:scale(.6);opacity:0} to{transform:scale(1);opacity:1} }
.chip-del { background:none; border:none; cursor:pointer; color:var(--red); opacity:.55; font-size:13px; padding:0; }
.chip-del:hover { opacity:1; }
.empty-hint { color:var(--text-muted); font-size:13px; font-style:italic; padding:6px 0; }

.btn { display:block; width:100%; padding:12px; border:none; border-radius:9px; font-family:'Noto Sans TC',sans-serif; font-size:14px; font-weight:700; cursor:pointer; letter-spacing:1px; transition:opacity .15s, transform .1s; }
.btn:active { transform:scale(.97); opacity:.85; }
.btn-success { background:var(--green);  color:#0d1117; }
.btn-orange  { background:var(--orange); color:#fff; }
.btn-ghost   { background:transparent; border:1px solid var(--border); color:var(--text-muted); font-size:13px; padding:9px; }

.sync-bar { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--text-muted); padding: 10px 0 0; }
.sync-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.sync-dot.ok      { background: var(--green); }
.sync-dot.loading { background: var(--yellow); animation: blink .8s infinite; }
.sync-dot.error   { background: var(--red); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

.stat-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:12px; }
.stat-pill { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:10px; text-align:center; }
.stat-num { font-family:'Space Mono',monospace; font-size:20px; font-weight:700; }
.stat-label { font-size:10px; color:var(--text-muted); margin-top:3px; letter-spacing:1px; }
.filter-row { display:flex; gap:8px; margin-bottom:12px; }
.filter-btn { flex:1; padding:8px; border:1px solid var(--border); border-radius:8px; background:var(--surface2); color:var(--text-muted); font-size:13px; font-weight:600; cursor:pointer; transition:all .12s; }
.filter-btn.fa { border-color:var(--blue);   color:var(--blue);   background:var(--blue-dim); }
.filter-btn.fl { border-color:var(--orange); color:var(--orange); background:var(--orange-dim); }
.filter-btn.fx { border-color:var(--red);    color:var(--red);    background:var(--red-dim); }
.record-item { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:13px; margin-bottom:9px; }
.rec-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:7px; }
.rec-class { font-size:15px; font-weight:900; letter-spacing:1px; }
.rec-time { font-family:'Space Mono',monospace; font-size:11px; color:var(--text-muted); }
.rec-tag { display:inline-flex; font-size:10px; font-weight:700; padding:2px 7px; border-radius:5px; margin-right:6px; vertical-align:middle; }
.rec-tag.tl { background:var(--orange-dim); color:var(--orange); border:1px solid rgba(232,145,45,.4); }
.rec-tag.ta { background:var(--red-dim);    color:var(--red);    border:1px solid rgba(248,81,73,.4); }
.rec-body { margin-bottom:8px; }
.rec-seats { display:flex; flex-wrap:wrap; gap:4px; }
.mini-chip { background:var(--red-dim); border:1px solid rgba(248,81,73,.4); color:var(--red); font-family:'Space Mono',monospace; font-size:12px; padding:2px 7px; border-radius:5px; }
.listen-ok  { font-size:13px; font-weight:700; color:var(--green); }
.listen-err { font-size:13px; font-weight:700; color:var(--red); }
.listen-note-text { font-size:12px; color:var(--text-muted); margin-top:5px; line-height:1.5; }
.rec-footer { display:flex; align-items:center; justify-content:space-between; }
.rec-count { font-size:12px; color:var(--text-muted); }
.rec-btns { display:flex; gap:6px; }
.rec-btn { background:none; border:1px solid var(--border); color:var(--text-muted); font-size:12px; padding:4px 11px; border-radius:6px; cursor:pointer; font-family:'Noto Sans TC',sans-serif; transition:all .12s; }
.rec-btn.del:hover  { border-color:var(--red);  color:var(--red);  background:var(--red-dim); }
.rec-btn.copy:hover { border-color:var(--blue); color:var(--blue); background:var(--blue-dim); }
.action-row { display:flex; gap:8px; margin-bottom:12px; }
.action-row button { flex:1; font-size:13px; padding:9px; }

.bottom-nav { position:fixed; bottom:0; left:0; right:0; background:var(--surface); border-top:1px solid var(--border); display:grid; grid-template-columns:1fr 1fr 1fr; z-index:50; }
.nav-item { display:flex; flex-direction:column; align-items:center; padding:10px 8px 14px; cursor:pointer; color:var(--text-muted); font-size:11px; font-weight:600; gap:3px; transition:color .12s; user-select:none; }
.nav-item.active { color:var(--blue); }
.nav-icon { font-size:20px; line-height:1; }
.badge { display:inline-flex; align-items:center; justify-content:center; background:var(--red); color:#fff; font-family:'Space Mono',monospace; font-size:10px; font-weight:700; min-width:16px; height:16px; border-radius:8px; padding:0 4px; margin-left:4px; vertical-align:middle; }

#toast { position:fixed; bottom:76px; left:50%; transform:translateX(-50%) translateY(10px); background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:9px 20px; border-radius:20px; font-size:13px; font-weight:500; white-space:nowrap; opacity:0; pointer-events:none; transition:all .22s; z-index:200; box-shadow:0 4px 20px rgba(0,0,0,.4); }
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

.settings-item { display:flex; align-items:center; justify-content:space-between; padding:13px 0; border-bottom:1px solid var(--border); }
.settings-item:last-child { border-bottom:none; }
.settings-label { font-size:14px; }
.settings-sub { font-size:11px; color:var(--text-muted); margin-top:2px; font-family:'Space Mono',monospace; word-break:break-all; }
.settings-btn { background:none; border:1px solid var(--border); color:var(--text-muted); font-size:12px; padding:5px 12px; border-radius:6px; cursor:pointer; white-space:nowrap; margin-left:12px; flex-shrink:0; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-icon">📋</div>
  <div class="topbar-text">
    <h1>班級登錄系統</h1>
    <p id="date-display"></p>
  </div>
</div>

<div id="main-app">
  <div class="page active" id="page-entry">
    <div class="card">
      <div class="card-title">📌 選擇任務</div>
      <div class="task-grid">
        <div class="task-card" id="task-listen" onclick="selectTask('listen')">
          <div class="task-icon">🎧</div>
          <div class="task-name">英聽測試</div>
          <div class="task-sub">設備狀態回報</div>
        </div>
        <div class="task-card" id="task-absence" onclick="selectTask('absence')">
          <div class="task-icon">📝</div>
          <div class="task-name">缺考登錄</div>
          <div class="task-sub">登錄缺考座號</div>
        </div>
      </div>
    </div>
    <div class="card" id="class-card" style="display:none">
      <div class="card-title">🏫 選擇班級</div>
      <div class="field">
        <label>年段</label>
        <div class="select-wrap">
          <select id="sel-school" onchange="updateClassOpts()">
            <option value="">請選擇年段</option>
            <option value="高中部">高中部</option>
            <option value="國中部">國中部</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>年級</label>
        <div class="select-wrap">
          <select id="sel-grade">
            <option value="">請選擇年級</option>
            <option value="一">一年級</option>
            <option value="二">二年級</option>
            <option value="三">三年級</option>
          </select>
        </div>
      </div>
      <div class="field" style="margin-bottom:0">
        <label>班級</label>
        <div class="select-wrap">
          <select id="sel-class"><option value="">請先選擇年段</option></select>
        </div>
      </div>
    </div>
    <div id="listen-section" style="display:none">
      <div class="card">
        <div class="card-title">🎧 設備狀態</div>
        <div class="listen-status-row">
          <button class="status-btn" id="btn-normal"   onclick="selectListenStatus('normal')">✓ 正常</button>
          <button class="status-btn" id="btn-abnormal" onclick="selectListenStatus('abnormal')">✗ 異常</button>
        </div>
        <div class="note-wrap" id="note-wrap">
          <div class="field" style="margin-bottom:0">
            <label>異常說明</label>
            <textarea id="listen-note" placeholder="請描述異常狀況，例如：3號座位耳機無聲、播放器無法開機..."></textarea>
          </div>
        </div>
      </div>
      <button class="btn btn-orange" onclick="submitRecord()" style="margin-bottom:10px">✓ 確認提交</button>
    </div>
    <div id="absence-section" style="display:none">
      <div class="card">
        <div class="picker-header">
          <span>缺考座號</span>
          <button class="present-btn" id="present-btn" onclick="toggleAllPresent()">全班到齊</button>
        </div>
        <div class="seat-picker" id="seat-picker"></div>
        <div class="manual-row">
          <input type="text" id="seat-input" placeholder="手動輸入座號" inputmode="numeric" autocomplete="off">
          <button class="manual-add-btn" onclick="manualAdd()">＋ 加入</button>
        </div>
      </div>
      <div class="all-present-notice" id="all-present-notice">✓ 已標記全班到齊，無人缺考</div>
      <div class="card" id="summary-card" style="display:none">
        <div class="card-title">已選座號 <span id="chips-count" class="badge">0</span></div>
        <div class="seat-summary" id="seat-summary"></div>
        <div style="margin-top:10px">
          <button class="btn btn-ghost" onclick="clearSeats()">清除全部</button>
        </div>
      </div>
      <button class="btn btn-success" onclick="submitRecord()" style="margin-bottom:10px">✓ 確認提交登錄</button>
    </div>
    <div class="sync-bar">
      <span class="sync-dot ok" id="sync-dot-entry"></span>
      <span id="sync-label-entry">就緒</span>
    </div>
  </div>

  <div class="page" id="page-records">
    <div class="stat-row">
      <div class="stat-pill"><div class="stat-num" id="stat-total">0</div><div class="stat-label">總筆數</div></div>
      <div class="stat-pill"><div class="stat-num" id="stat-listen">0</div><div class="stat-label">英聽回報</div></div>
      <div class="stat-pill"><div class="stat-num" id="stat-absence">0</div><div class="stat-label">缺考班數</div></div>
    </div>
    <div class="filter-row">
      <button class="filter-btn fa" id="filter-all"     onclick="setFilter('all')">全部</button>
      <button class="filter-btn"   id="filter-listen"  onclick="setFilter('listen')">英聽</button>
      <button class="filter-btn"   id="filter-absence" onclick="setFilter('absence')">缺考</button>
    </div>
    <div class="action-row">
      <button class="btn btn-ghost" onclick="copyAll()">📋 複製全部</button>
      <button class="btn btn-ghost" onclick="clearAllRecords()">🗑 清除全部</button>
    </div>
    <div id="records-container">
      <p class="empty-hint" style="text-align:center;padding:32px 0">尚無紀錄</p>
    </div>
    <div class="sync-bar">
      <span class="sync-dot ok" id="sync-dot-rec"></span>
      <span id="sync-label-rec">就緒</span>
    </div>
  </div>

  <div class="page" id="page-settings">
    <div class="card">
      <div class="card-title">🔗 連線設定</div>
      <div class="settings-item">
        <div>
          <div class="settings-label">Apps Script 網址</div>
          <div class="settings-sub" id="settings-url-display">—</div>
        </div>
      </div>
      <div class="settings-item">
        <div><div class="settings-label">重新整理紀錄</div></div>
        <button class="settings-btn" onclick="loadRecords()">重新載入</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">ℹ️ 說明</div>
      <p style="font-size:13px;color:var(--text-muted);line-height:1.7">
        所有登錄資料即時寫入 Google 試算表，群組內所有人使用同一份 HTML，資料完全共用。切換到「紀錄」頁時會自動重新載入。
      </p>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item active" id="nav-entry"    onclick="switchPage('entry')">  <span class="nav-icon">✏️</span>登錄</div>
    <div class="nav-item"        id="nav-records"  onclick="switchPage('records')"><span class="nav-icon">📄</span>紀錄<span class="badge" id="nav-badge" style="display:none">0</span></div>
    <div class="nav-item"        id="nav-settings" onclick="switchPage('settings')"><span class="nav-icon">⚙️</span>設定</div>
  </div>
</div>

<div id="toast"></div>

<script>
/*
 * ══════════════════════════════════════════════════════
 *  全域錯誤攔截
 *  - 跨域 fetch 失敗時瀏覽器只會給 "Script error."
 *  - 未捕獲的 Promise rejection（fetch 超時等）
 *  - 在此統一攔截，避免 console 紅字
 * ══════════════════════════════════════════════════════
 */
window.onerror = function() { return true; };
window.addEventListener('unhandledrejection', function(e) { e.preventDefault(); });

/*
 * ══════════════════════════════════════════════════════
 *  常數
 * ══════════════════════════════════════════════════════
 */
var WD = ['日','一','二','三','四','五','六'];
var now_init = new Date();
document.getElementById('date-display').textContent =
  now_init.getFullYear() + '.' + (now_init.getMonth()+1) + '.' + now_init.getDate() + ' (' + WD[now_init.getDay()] + ')';

var API_URL = 'https://script.google.com/macros/s/AKfycbwzSbn-0MQ4RQ0HferrWJOWKwjU43cVA3AGeMF59tZVCRNW0xD0KLMlxmFpzeM1NznA/exec';

/*
 * ══════════════════════════════════════════════════════
 *  API 封裝
 *
 *  Google Apps Script Web App 注意事項：
 *  1. 部署後的 URL 會 302 redirect → 需要 redirect:'follow'
 *  2. POST + Content-Type: application/json → 觸發 CORS preflight (OPTIONS)
 *     但 GAS 不處理 OPTIONS → 直接失敗
 *  3. 解法：用 Content-Type: text/plain 避免 preflight
 *  4. GAS 端 doPost(e) 用 JSON.parse(e.postData.contents) 解析
 * ══════════════════════════════════════════════════════
 */
function apiGet(params) {
  var url = API_URL + '?' + new URLSearchParams(params).toString();
  return fetch(url, { redirect: 'follow' })
    .then(function(res) { return res.text(); })
    .then(function(text) { return JSON.parse(text); });
}

function apiPost(payload) {
  return fetch(API_URL, {
    method: 'POST',
    redirect: 'follow',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload)
  })
  .then(function(res) { return res.text(); })
  .then(function(text) { return JSON.parse(text); });
}

/*
 * ══════════════════════════════════════════════════════
 *  工具函式
 * ══════════════════════════════════════════════════════
 */
function escapeHtml(s) {
  if (!s) return '';
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

var toastTimer;
function showToast(msg) {
  var el = document.getElementById('toast');
  if (!el) return;
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.classList.remove('show'); }, 2400);
}

function setSyncState(page, state, label) {
  var dot = document.getElementById('sync-dot-' + page);
  var lbl = document.getElementById('sync-label-' + page);
  if (dot) dot.className = 'sync-dot ' + state;
  if (lbl) lbl.textContent = label;
}

/*
 * ══════════════════════════════════════════════════════
 *  頁面切換
 * ══════════════════════════════════════════════════════
 */
function switchPage(name) {
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.nav-item').forEach(function(n) { n.classList.remove('active'); });
  document.getElementById('page-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  if (name === 'records') loadRecords();
}

/*
 * ══════════════════════════════════════════════════════
 *  任務選擇
 * ══════════════════════════════════════════════════════
 */
var currentTask = '';
function selectTask(task) {
  currentTask = task;
  document.getElementById('task-listen').className  = 'task-card' + (task === 'listen'  ? ' sel-listen'  : '');
  document.getElementById('task-absence').className = 'task-card' + (task === 'absence' ? ' sel-absence' : '');
  document.getElementById('class-card').style.display = 'block';
  document.getElementById('listen-section').style.display  = task === 'listen'  ? 'block' : 'none';
  document.getElementById('absence-section').style.display = task === 'absence' ? 'block' : 'none';
  if (task === 'listen') { listenStatus = ''; resetListenUI(); }
}

/*
 * ══════════════════════════════════════════════════════
 *  班級選擇
 * ══════════════════════════════════════════════════════
 */
function updateClassOpts() {
  var s = document.getElementById('sel-school').value;
  var sel = document.getElementById('sel-class');
  if (!s) { sel.innerHTML = '<option value="">請先選擇年段</option>'; return; }
  var opts = '<option value="">請選擇班級</option>';
  if (s === '高中部') {
    ['甲','乙','丙','丁','戊','己','庚'].forEach(function(c) {
      opts += '<option value="' + c + '">' + c + '班</option>';
    });
  } else {
    for (var i = 1; i <= 10; i++) opts += '<option value="' + i + '">' + i + '班</option>';
  }
  sel.innerHTML = opts;
}

/*
 * ══════════════════════════════════════════════════════
 *  英聽狀態
 * ══════════════════════════════════════════════════════
 */
var listenStatus = '';
function selectListenStatus(s) {
  listenStatus = s;
  document.getElementById('btn-normal').className   = 'status-btn' + (s === 'normal'   ? ' sel-normal'   : '');
  document.getElementById('btn-abnormal').className = 'status-btn' + (s === 'abnormal' ? ' sel-abnormal' : '');
  document.getElementById('note-wrap').className    = 'note-wrap'  + (s === 'abnormal' ? ' show' : '');
  if (s === 'normal') document.getElementById('listen-note').value = '';
}
function resetListenUI() {
  document.getElementById('btn-normal').className   = 'status-btn';
  document.getElementById('btn-abnormal').className = 'status-btn';
  document.getElementById('note-wrap').className    = 'note-wrap';
  document.getElementById('listen-note').value = '';
}

/*
 * ══════════════════════════════════════════════════════
 *  座號選取
 * ══════════════════════════════════════════════════════
 */
var MAX_SEAT = 45;
var currentSeats = new Set();
var allPresent = false;

function buildPicker() {
  var p = document.getElementById('seat-picker');
  p.innerHTML = '';
  for (var i = 1; i <= MAX_SEAT; i++) {
    var b = document.createElement('button');
    b.className = 'seat-btn';
    b.textContent = i;
    b.dataset.seat = i;
    b.onclick = (function(num) { return function() { toggleSeat(num); }; })(i);
    p.appendChild(b);
  }
}

function toggleSeat(n) {
  allPresent = false;
  document.getElementById('all-present-notice').style.display = 'none';
  document.getElementById('present-btn').classList.remove('active');
  if (currentSeats.has(n)) currentSeats.delete(n); else currentSeats.add(n);
  syncPickerUI();
  renderSummary();
}

function syncPickerUI() {
  document.querySelectorAll('.seat-btn').forEach(function(b) {
    b.classList.toggle('selected', currentSeats.has(parseInt(b.dataset.seat)));
  });
}

function toggleAllPresent() {
  allPresent = !allPresent;
  if (allPresent) {
    currentSeats.clear();
    syncPickerUI();
    renderSummary();
    document.getElementById('all-present-notice').style.display = 'block';
    document.getElementById('present-btn').classList.add('active');
    showToast('全班到齊，可直接提交');
  } else {
    document.getElementById('all-present-notice').style.display = 'none';
    document.getElementById('present-btn').classList.remove('active');
  }
}

function manualAdd() {
  allPresent = false;
  document.getElementById('all-present-notice').style.display = 'none';
  document.getElementById('present-btn').classList.remove('active');
  var parts = document.getElementById('seat-input').value.split(/[\s,，、\/]+/).filter(Boolean);
  var added = 0;
  parts.forEach(function(p) {
    var n = parseInt(p);
    if (!isNaN(n) && n > 0 && n <= 99 && !currentSeats.has(n)) {
      currentSeats.add(n);
      if (n > MAX_SEAT) {
        var picker = document.getElementById('seat-picker');
        if (!picker.querySelector('[data-seat="' + n + '"]')) {
          var b = document.createElement('button');
          b.className = 'seat-btn selected';
          b.textContent = n;
          b.dataset.seat = n;
          b.onclick = (function(num) { return function() { toggleSeat(num); }; })(n);
          picker.appendChild(b);
        }
      }
      added++;
    }
  });
  document.getElementById('seat-input').value = '';
  syncPickerUI();
  renderSummary();
  showToast(added ? '✅ 已加入 ' + added + ' 個座號' : '⚠️ 未新增（重複或格式錯誤）');
}

document.getElementById('seat-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') manualAdd();
});

function renderSummary() {
  var sorted = Array.from(currentSeats).sort(function(a,b) { return a - b; });
  document.getElementById('chips-count').textContent = sorted.length;
  var card = document.getElementById('summary-card');
  if (!sorted.length) { card.style.display = 'none'; return; }
  card.style.display = 'block';
  document.getElementById('seat-summary').innerHTML = sorted.map(function(n) {
    return '<div class="seat-chip">' + String(n).padStart(2,'0') + '<button class="chip-del" onclick="removeSeat(' + n + ')">×</button></div>';
  }).join('');
}

function removeSeat(n) { currentSeats.delete(n); syncPickerUI(); renderSummary(); }

function clearSeats() {
  currentSeats.clear();
  allPresent = false;
  document.getElementById('all-present-notice').style.display = 'none';
  document.getElementById('present-btn').classList.remove('active');
  document.querySelectorAll('.seat-btn').forEach(function(b) {
    if (parseInt(b.dataset.seat) > MAX_SEAT) b.remove();
  });
  syncPickerUI();
  renderSummary();
  showToast('已清除所有座號');
}

/*
 * ══════════════════════════════════════════════════════
 *  提交紀錄
 * ══════════════════════════════════════════════════════
 */
function submitRecord() {
  var school = document.getElementById('sel-school').value;
  var g      = document.getElementById('sel-grade').value;
  var c      = document.getElementById('sel-class').value;
  if (!currentTask)        { showToast('⚠️ 請先選擇任務'); return; }
  if (!school || !g || !c) { showToast('⚠️ 請選擇年段、年級和班級'); return; }
  if (currentTask === 'listen') {
    if (!listenStatus) { showToast('⚠️ 請選擇正常或異常'); return; }
    if (listenStatus === 'abnormal' && !document.getElementById('listen-note').value.trim()) { showToast('⚠️ 請填寫異常說明'); return; }
  }
  if (currentTask === 'absence' && !allPresent && currentSeats.size === 0) { showToast('⚠️ 請選擇座號，或點「全班到齊」'); return; }

  var now = new Date();
  var rec = {
    id: Date.now(),
    taskType:     currentTask,
    className:    school + g + '年' + c + '班',
    seats:        currentTask === 'absence' ? Array.from(currentSeats).sort(function(a,b){return a-b}) : [],
    allPresent:   currentTask === 'absence' ? allPresent : false,
    listenStatus: currentTask === 'listen'  ? listenStatus : '',
    listenNote:   currentTask === 'listen'  ? document.getElementById('listen-note').value.trim() : '',
    date: (now.getMonth()+1) + '/' + now.getDate(),
    time: String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0')
  };

  setSyncState('entry', 'loading', '儲存中...');
  apiPost({ action: 'add', record: rec })
    .then(function(data) {
      if (!data.ok) throw new Error('not ok');
      setSyncState('entry', 'ok', '已同步到試算表');
      showToast('🎉 ' + rec.className + ' 登錄完成！');
      if (currentTask === 'absence') clearSeats();
      if (currentTask === 'listen')  { listenStatus = ''; resetListenUI(); }
      return loadRecords();
    })
    .catch(function() {
      setSyncState('entry', 'error', '儲存失敗，請重試');
      showToast('❌ 儲存失敗，請確認連線');
    });
}

/*
 * ══════════════════════════════════════════════════════
 *  紀錄管理
 * ══════════════════════════════════════════════════════
 */
var records = [];
var currentFilter = 'all';

function loadRecords() {
  setSyncState('rec', 'loading', '載入中...');
  return apiGet({ action: 'getAll' })
    .then(function(data) {
      records = data.records || [];
      renderRecords();
      updateBadge();
      setSyncState('rec', 'ok', '已更新，共 ' + records.length + ' 筆');
    })
    .catch(function() {
      setSyncState('rec', 'error', '載入失敗');
    });
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(function(b) { b.className = 'filter-btn'; });
  var cls = { all:'fa', listen:'fl', absence:'fx' };
  document.getElementById('filter-' + f).classList.add(cls[f]);
  renderRecords();
}

function renderRecords() {
  document.getElementById('stat-total').textContent   = records.length;
  document.getElementById('stat-listen').textContent  = records.filter(function(r) { return r.taskType === 'listen'; }).length;
  document.getElementById('stat-absence').textContent = records.filter(function(r) { return r.taskType === 'absence'; }).length;
  var list = currentFilter === 'all' ? records : records.filter(function(r) { return r.taskType === currentFilter; });
  var container = document.getElementById('records-container');
  if (!list.length) {
    container.innerHTML = '<p class="empty-hint" style="text-align:center;padding:32px 0">尚無紀錄</p>';
    return;
  }
  container.innerHTML = list.map(function(r) {
    var isL = r.taskType === 'listen';
    var tag = '<span class="rec-tag ' + (isL ? 'tl' : 'ta') + '">' + (isL ? '英聽' : '缺考') + '</span>';
    var body = '';
    if (isL) {
      body = r.listenStatus === 'normal'
        ? '<div class="listen-ok">✓ 設備正常</div>'
        : '<div class="listen-err">✗ 設備異常</div>' + (r.listenNote ? '<div class="listen-note-text">' + escapeHtml(r.listenNote) + '</div>' : '');
    } else {
      body = '<div class="rec-seats">' + (r.seats.length === 0
        ? '<span style="color:var(--green);font-size:13px;font-weight:700">✓ 全班到齊</span>'
        : r.seats.map(function(s) { return '<span class="mini-chip">' + String(s).padStart(2,'0') + '</span>'; }).join('')
      ) + '</div>';
    }
    var count = isL
      ? (r.listenStatus === 'normal' ? '設備正常' : '設備異常')
      : (r.seats.length === 0 ? '無人缺考' : '缺考 ' + r.seats.length + ' 人');
    return '<div class="record-item">'
      + '<div class="rec-header"><span class="rec-class">' + tag + escapeHtml(r.className) + '</span><span class="rec-time">' + escapeHtml(r.date + ' ' + r.time) + '</span></div>'
      + '<div class="rec-body">' + body + '</div>'
      + '<div class="rec-footer">'
      + '<span class="rec-count">' + count + '</span>'
      + '<div class="rec-btns">'
      + '<button class="rec-btn copy" onclick="copyRecord(' + r.id + ')">複製</button>'
      + '<button class="rec-btn del"  onclick="deleteRecord(' + r.id + ')">刪除</button>'
      + '</div></div></div>';
  }).join('');
}

function deleteRecord(id) {
  setSyncState('rec', 'loading', '刪除中...');
  apiPost({ action: 'delete', id: id })
    .then(function() { showToast('已刪除'); return loadRecords(); })
    .catch(function() { showToast('❌ 刪除失敗'); });
}

function clearAllRecords() {
  if (!records.length) { showToast('沒有紀錄可清除'); return; }
  if (!confirm('確定要清除全部 ' + records.length + ' 筆紀錄？')) return;
  setSyncState('rec', 'loading', '清除中...');
  apiPost({ action: 'clear' })
    .then(function() { showToast('已清除全部紀錄'); return loadRecords(); })
    .catch(function() { showToast('❌ 清除失敗'); });
}

function copyRecord(id) {
  var r = records.find(function(x) { return x.id == id; });
  if (!r) return;
  var t = '【' + (r.taskType === 'listen' ? '英聽測試' : '缺考登錄') + '】\n班級：' + r.className + '\n';
  if (r.taskType === 'listen') {
    t += '設備狀態：' + (r.listenStatus === 'normal' ? '正常' : '異常');
    if (r.listenNote) t += '\n異常說明：' + r.listenNote;
  } else {
    var seats = r.seats.length === 0
      ? '無（全班到齊）'
      : r.seats.map(function(s) { return String(s).padStart(2,'0'); }).join('、');
    t += '缺考座號：' + seats + '\n缺考人數：' + r.seats.length + ' 人';
  }
  copyText(t + '\n時間：' + r.date + ' ' + r.time);
}

function copyAll() {
  if (!records.length) { showToast('沒有紀錄可複製'); return; }
  var d = (new Date().getMonth()+1) + '/' + new Date().getDate();
  var lines = ['📋 登錄紀錄彙整（' + d + '）\n' + '─'.repeat(18)];
  records.forEach(function(r, i) {
    var detail = r.taskType === 'listen'
      ? (r.listenStatus === 'normal' ? '設備正常' : '設備異常：' + (r.listenNote || '（無說明）'))
      : (r.seats.length === 0 ? '全班到齊（無人缺考）' : '缺考：' + r.seats.map(function(s){return String(s).padStart(2,'0')}).join('、') + '（共' + r.seats.length + '人）');
    lines.push((i+1) + '. [' + (r.taskType === 'listen' ? '英聽' : '缺考') + '] ' + r.className + '\n   ' + detail);
  });
  copyText(lines.join('\n'));
}

function copyText(t) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(t).then(function() { showToast('✅ 已複製到剪貼簿'); }).catch(function() {});
  } else {
    var ta = document.createElement('textarea');
    ta.value = t;
    ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('✅ 已複製到剪貼簿');
  }
}

function updateBadge() {
  var b = document.getElementById('nav-badge');
  if (!b) return;
  if (!records.length) { b.style.display = 'none'; return; }
  b.style.display = 'inline-flex';
  b.textContent = records.length;
}

/*
 * ══════════════════════════════════════════════════════
 *  啟動
 * ══════════════════════════════════════════════════════
 */
document.getElementById('main-app').style.display = 'block';
document.getElementById('settings-url-display').textContent = API_URL;
buildPicker();
loadRecords();
</script>
