<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>班級登錄系統</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap');

:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #21262d;
  --border: #30363d;
  --text: #e6edf3;
  --text-muted: #7d8590;
  --red: #f85149;
  --red-dim: rgba(248,81,73,0.15);
  --green: #3fb950;
  --green-dim: rgba(63,185,80,0.15);
  --yellow: #d29922;
  --yellow-dim: rgba(210,153,34,0.12);
  --blue: #58a6ff;
  --blue-dim: rgba(88,166,255,0.12);
  --orange: #e8912d;
  --orange-dim: rgba(232,145,45,0.15);
  --radius: 12px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', sans-serif; min-height: 100vh; font-size: 15px; }

.topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 18px 12px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 50; }
.topbar-icon { width: 36px; height: 36px; background: var(--blue-dim); border: 1.5px solid var(--blue); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
.topbar-text h1 { font-size: 16px; font-weight: 900; letter-spacing: 1px; }
.topbar-text p  { font-size: 10px; color: var(--text-muted); margin-top: 1px; }

.page { display: none; padding: 18px 16px 90px; animation: fadeUp .22s ease; }
.page.active { display: block; }
@keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
.card-title { font-size: 11px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; }
.field { margin-bottom: 11px; }
.field label { display: block; font-size: 11px; font-weight: 600; color: var(--text-muted); letter-spacing: 1px; margin-bottom: 6px; }
select, input[type="text"], textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 13px; color: var(--text); font-family: 'Noto Sans TC', sans-serif; font-size: 14px; outline: none; appearance: none; -webkit-appearance: none; transition: border-color .15s; }
input[type="password"] { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 13px; color: var(--text); font-family: 'Space Mono', monospace; font-size: 14px; outline: none; transition: border-color .15s; }
select:focus, input[type="text"]:focus, input[type="password"]:focus, textarea:focus { border-color: var(--blue); }
textarea { resize: vertical; min-height: 80px; line-height: 1.6; }
.select-wrap { position: relative; }
.select-wrap::after { content:'▾'; position:absolute; right:12px; top:50%; transform:translateY(-50%); color:var(--text-muted); pointer-events:none; font-size:11px; }

.task-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.task-card { background: var(--surface2); border: 1.5px solid var(--border); border-radius: 10px; padding: 18px 12px; cursor: pointer; text-align: center; transition: all .15s; user-select: none; }
.task-card:active { transform: scale(.96); }
.task-card.sel-listen  { background: var(--orange-dim); border-color: var(--orange); }
.task-card.sel-absence { background: var(--red-dim);    border-color: var(--red); }
.task-icon { font-size: 28px; margin-bottom: 7px; }
.task-name { font-size: 14px; font-weight: 900; letter-spacing: 1px; }
.task-sub  { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
.task-card.sel-listen  .task-name { color: var(--orange); }
.task-card.sel-listen  .task-sub  { color: var(--orange); opacity: .7; }
.task-card.sel-absence .task-name { color: var(--red); }
.task-card.sel-absence .task-sub  { color: var(--red); opacity: .7; }

.listen-status-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.status-btn { padding: 14px 8px; border-radius: 9px; border: 1.5px solid var(--border); background: var(--surface2); color: var(--text-muted); font-family: 'Noto Sans TC', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; text-align: center; transition: all .15s; user-select: none; }
.status-btn:active { transform: scale(.96); }
.status-btn.sel-normal   { background: var(--green-dim); border-color: var(--green);  color: var(--green); }
.status-btn.sel-abnormal { background: var(--red-dim);   border-color: var(--red);    color: var(--red); }
.note-wrap { display: none; }
.note-wrap.show { display: block; }

.picker-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.picker-header span { font-size:11px; font-weight:700; letter-spacing:2px; color:var(--text-muted); text-transform:uppercase; }
.present-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); font-size:12px; padding:5px 12px; border-radius:6px; cursor:pointer; font-family:'Noto Sans TC',sans-serif; transition: all .15s; }
.present-btn.active { background:var(--green-dim); border-color:var(--green); color:var(--green); }
.seat-picker { display:grid; grid-template-columns:repeat(9,1fr); gap:5px; margin-bottom:10px; }
.seat-btn { aspect-ratio:1; border:1px solid var(--border); border-radius:7px; background:var(--surface2); color:var(--text-muted); font-family:'Space Mono',monospace; font-size:11px; font-weight:700; cursor:pointer; padding:0; display:flex; align-items:center; justify-content:center; transition: all .12s; user-select:none; }
.seat-btn:active { transform:scale(.85); }
.seat-btn.selected { background:var(--red-dim); border-color:var(--red); color:var(--red); }
.manual-row { display:flex; gap:8px; padding-top:10px; border-top:1px solid var(--border); align-items:center; }
.manual-row input { flex:1; font-family:'Space Mono',monospace; font-size:14px; letter-spacing:2px; }
.manual-add-btn { flex-shrink:0; background:var(--red); color:#fff; border:none; padding:10px 14px; border-radius:7px; font-family:'Noto Sans TC',sans-serif; font-size:13px; font-weight:700; cursor:pointer; white-space:nowrap; }
.manual-add-btn:active { opacity:.75; transform:scale(.96); }
.all-present-notice { background: var(--green-dim); border: 1px solid rgba(63,185,80,.4); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: var(--green); margin-bottom: 12px; display: none; }

.seat-summary { display:flex; flex-wrap:wrap; gap:6px; padding:2px 0; }
.seat-chip { background:var(--red-dim); border:1.5px solid var(--red); color:var(--red); font-family:'Space Mono',monospace; font-size:12px; font-weight:700; padding:4px 9px; border-radius:6px; display:flex; align-items:center; gap:5px; animation: pop .16s ease; }
@keyframes pop { from{transform:scale(.6);opacity:0} to{transform:scale(1);opacity:1} }
.chip-del { background:none; border:none; cursor:pointer; color:var(--red); opacity:.55; font-size:13px; padding:0; }
.chip-del:hover { opacity:1; }
.empty-hint { color:var(--text-muted); font-size:13px; font-style:italic; padding:6px 0; }

.btn { display:block; width:100%; padding:12px; border:none; border-radius:9px; font-family:'Noto Sans TC',sans-serif; font-size:14px; font-weight:700; cursor:pointer; letter-spacing:1px; transition:opacity .15s, transform .1s; }
.btn:active { transform:scale(.97); opacity:.85; }
.btn-success { background:var(--green);  color:#0d1117; }
.btn-orange  { background:var(--orange); color:#fff; }
.btn-blue    { background:var(--blue);   color:#0d1117; }
.btn-ghost   { background:transparent; border:1px solid var(--border); color:var(--text-muted); font-size:13px; padding:9px; }

.sync-bar { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--text-muted); padding: 10px 0 0; }
.sync-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.sync-dot.ok      { background: var(--green); }
.sync-dot.loading { background: var(--yellow); animation: blink .8s infinite; }
.sync-dot.error   { background: var(--red); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

.stat-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:12px; }
.stat-pill { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:10px; text-align:center; }
.stat-num { font-family:'Space Mono',monospace; font-size:20px; font-weight:700; }
.stat-label { font-size:10px; color:var(--text-muted); margin-top:3px; letter-spacing:1px; }

.filter-row { display:flex; gap:8px; margin-bottom:8px; }
.filter-btn { flex:1; padding:8px; border:1px solid var(--border); border-radius:8px; background:var(--surface2); color:var(--text-muted); font-size:13px; font-weight:600; cursor:pointer; transition:all .12s; }
.filter-btn.fa { border-color:var(--blue);   color:var(--blue);   background:var(--blue-dim); }
.filter-btn.fl { border-color:var(--orange); color:var(--orange); background:var(--orange-dim); }
.filter-btn.fx { border-color:var(--red);    color:var(--red);    background:var(--red-dim); }

.sub-filter-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:12px; }
.sub-filter-row select { padding: 8px 10px; font-size: 13px; font-weight: 600; color: var(--text-muted); background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; }

.record-item { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:13px; margin-bottom:9px; }
.rec-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:7px; }
.rec-class { font-size:15px; font-weight:900; letter-spacing:1px; }
.rec-time { font-family:'Space Mono',monospace; font-size:11px; color:var(--text-muted); }
.rec-tag { display:inline-flex; font-size:10px; font-weight:700; padding:2px 7px; border-radius:5px; margin-right:6px; vertical-align:middle; }
.rec-tag.tl { background:var(--orange-dim); color:var(--orange); border:1px solid rgba(232,145,45,.4); }
.rec-tag.ta { background:var(--red-dim);    color:var(--red);    border:1px solid rgba(248,81,73,.4); }
.rec-body { margin-bottom:8px; }
.rec-seats { display:flex; flex-wrap:wrap; gap:4px; }
.mini-chip { background:var(--red-dim); border:1px solid rgba(248,81,73,.4); color:var(--red); font-family:'Space Mono',monospace; font-size:12px; padding:2px 7px; border-radius:5px; }
.listen-ok  { font-size:13px; font-weight:700; color:var(--green); }
.listen-err { font-size:13px; font-weight:700; color:var(--red); }
.listen-note-text { font-size:12px; color:var(--text-muted); margin-top:5px; line-height:1.5; }
.rec-footer { display:flex; align-items:center; justify-content:space-between; }
.rec-count { font-size:12px; color:var(--text-muted); }
.rec-btns { display:flex; gap:6px; }
.rec-btn { background:none; border:1px solid var(--border); color:var(--text-muted); font-size:12px; padding:4px 11px; border-radius:6px; cursor:pointer; font-family:'Noto Sans TC',sans-serif; transition:all .12s; }
.rec-btn.del:hover  { border-color:var(--red);  color:var(--red);  background:var(--red-dim); }
.rec-btn.copy:hover { border-color:var(--blue); color:var(--blue); background:var(--blue-dim); }
.action-row { display:flex; gap:8px; margin-bottom:12px; }
.action-row button { flex:1; font-size:13px; padding:9px; }

/* ★ 調整為兩等份 (1fr 1fr) */
.bottom-nav { position:fixed; bottom:0; left:0; right:0; background:var(--surface); border-top:1px solid var(--border); display:grid; grid-template-columns:1fr 1fr; z-index:50; }
.nav-item { display:flex; flex-direction:column; align-items:center; padding:10px 8px 14px; cursor:pointer; color:var(--text-muted); font-size:11px; font-weight:600; gap:3px; transition:color .12s; user-select:none; }
.nav-item.active { color:var(--blue); }
.nav-icon { font-size:20px; line-height:1; }
.badge { display:inline-flex; align-items:center; justify-content:center; background:var(--red); color:#fff; font-family:'Space Mono',monospace; font-size:10px; font-weight:700; min-width:16px; height:16px; border-radius:8px; padding:0 4px; margin-left:4px; vertical-align:middle; }

#toast { position:fixed; bottom:76px; left:50%; transform:translateX(-50%) translateY(10px); background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:9px 20px; border-radius:20px; font-size:13px; font-weight:500; white-space:nowrap; opacity:0; pointer-events:none; transition:all .22s; z-index:200; box-shadow:0 4px 20px rgba(0,0,0,.4); }
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

.setup-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:80vh; padding:24px 20px; }
.setup-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:28px 22px; width:100%; max-width:400px; }
.setup-icon { font-size:48px; text-align:center; margin-bottom:16px; }
.setup-title { font-size:18px; font-weight:900; text-align:center; margin-bottom:6px; }
.setup-desc { font-size:13px; color:var(--text-muted); text-align:center; margin-bottom:24px; line-height:1.6; }
.setup-field { margin-bottom:16px; }
.setup-field label { display:block; font-size:12px; font-weight:700; color:var(--text-muted); letter-spacing:1px; margin-bottom:6px; }
.setup-hint { font-size:11px; color:var(--text-muted); margin-top:5px; line-height:1.5; }
.setup-error { background:var(--red-dim); border:1px solid rgba(248,81,73,.4); border-radius:8px; padding:10px 14px; font-size:13px; color:var(--red); margin-bottom:16px; display:none; }
.connected-badge { display:inline-flex; align-items:center; gap:5px; background:var(--green-dim); border:1px solid rgba(63,185,80,.4); color:var(--green); font-size:12px; font-weight:700; padding:3px 10px; border-radius:6px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-icon">📋</div>
  <div class="topbar-text">
    <h1>班級登錄系統</h1>
    <p id="date-display"></p>
  </div>
</div>

<div id="setup-screen" class="setup-screen">
  <div class="setup-card">
    <div class="setup-icon">🔐</div>
    <div class="setup-title">輸入密碼</div>
    <div class="setup-desc">請輸入管理員提供的存取密碼。</div>
    <div class="setup-error" id="setup-error"></div>
    <div class="setup-field">
      <label>存取密碼</label>
      <input type="password" id="setup-token" placeholder="請輸入密碼" autocomplete="off">
    </div>
    <button class="btn btn-blue" onclick="unlockApp()" style="margin-top:8px">🔓 解鎖</button>
  </div>
</div>

<div id="main-app" style="display:none">
  
  <div class="page active" id="page-entry">
    <div class="card">
      <div class="card-title">📌 選擇任務</div>
      <div class="task-grid">
        <div class="task-card" id="task-listen" onclick="selectTask('listen')">
          <div class="task-icon">🎧</div>
          <div class="task-name">英聽測試</div>
          <div class="task-sub">設備狀態回報</div>
        </div>
        <div class="task-card" id="task-absence" onclick="selectTask('absence')">
          <div class="task-icon">📝</div>
          <div class="task-name">缺考登錄</div>
          <div class="task-sub">登錄缺考座號</div>
        </div>
      </div>
    </div>
    <div class="card" id="class-card" style="display:none">
      <div class="card-title">🏫 選擇班級</div>
      <div class="field"><label>年段</label><div class="select-wrap"><select id="sel-school" onchange="updateClassOpts()"><option value="">請選擇年段</option><option value="高中部">高中部</option><option value="國中部">國中部</option></select></div></div>
      <div class="field"><label>年級</label><div class="select-wrap"><select id="sel-grade"><option value="">請選擇年級</option><option value="一">一年級</option><option value="二">二年級</option><option value="三">三年級</option></select></div></div>
      <div class="field" style="margin-bottom:0"><label>班級</label><div class="select-wrap"><select id="sel-class"><option value="">請先選擇年段</option></select></div></div>
    </div>
    <div id="listen-section" style="display:none">
      <div class="card"><div class="card-title">🎧 設備狀態</div><div class="listen-status-row"><button class="status-btn" id="btn-normal" onclick="selectListenStatus('normal')">✓ 正常</button><button class="status-btn" id="btn-abnormal" onclick="selectListenStatus('abnormal')">✗ 異常</button></div><div class="note-wrap" id="note-wrap"><div class="field" style="margin-bottom:0"><label>異常說明</label><textarea id="listen-note" placeholder="請描述異常狀況，例如：3號座位耳機無聲、播放器無法開機..."></textarea></div></div></div>
      <button class="btn btn-orange" onclick="submitRecord()" style="margin-bottom:10px">✓ 確認提交</button>
    </div>
    <div id="absence-section" style="display:none">
      <div class="card"><div class="picker-header"><span>缺考座號</span><button class="present-btn" id="present-btn" onclick="toggleAllPresent()">全班到齊</button></div><div class="seat-picker" id="seat-picker"></div><div class="manual-row"><input type="text" id="seat-input" placeholder="手動輸入座號" inputmode="numeric" autocomplete="off"><button class="manual-add-btn" onclick="manualAdd()">＋ 加入</button></div></div>
      <div class="all-present-notice" id="all-present-notice">✓ 已標記全班到齊，無人缺考</div>
      <div class="card" id="summary-card" style="display:none"><div class="card-title">已選座號 <span id="chips-count" class="badge">0</span></div><div class="seat-summary" id="seat-summary"></div><div style="margin-top:10px"><button class="btn btn-ghost" onclick="clearSeats()">清除全部</button></div></div>
      <button class="btn btn-success" onclick="submitRecord()" style="margin-bottom:10px">✓ 確認提交登錄</button>
    </div>
    <div class="sync-bar"><span class="sync-dot ok" id="sync-dot-entry"></span><span id="sync-label-entry">就緒</span></div>
  </div>

  <div class="page" id="page-records">
    <div class="stat-row"><div class="stat-pill"><div class="stat-num" id="stat-total">0</div><div class="stat-label">總筆數</div></div><div class="stat-pill"><div class="stat-num" id="stat-listen">0</div><div class="stat-label">英聽回報</div></div><div class="stat-pill"><div class="stat-num" id="stat-absence">0</div><div class="stat-label">缺考班數</div></div></div>
    
    <div class="filter-row">
      <button class="filter-btn fa" id="filter-all" onclick="setFilter('all')">全部</button>
      <button class="filter-btn" id="filter-listen" onclick="setFilter('listen')">英聽</button>
      <button class="filter-btn" id="filter-absence" onclick="setFilter('absence')">缺考</button>
    </div>

    <div class="sub-filter-row">
      <div class="select-wrap">
        <select id="filter-date" onchange="setSubFilter('date', this.value)">
          <option value="all">全部日期</option>
        </select>
      </div>
      <div class="select-wrap">
        <select id="filter-school" onchange="setSubFilter('school', this.value)">
          <option value="all">全部年段</option>
          <option value="高中部">高中部</option>
          <option value="國中部">國中部</option>
        </select>
      </div>
      <div class="select-wrap">
        <select id="filter-grade" onchange="setSubFilter('grade', this.value)">
          <option value="all">全部年級</option>
          <option value="一">一年級</option>
          <option value="二">二年級</option>
          <option value="三">三年級</option>
        </select>
      </div>
    </div>

    <div class="action-row">
      <button class="btn btn-ghost" onclick="copyAll()">📋 複製全部</button>
      <button class="btn btn-ghost" onclick="clearAllRecords()">🗑 清除全部</button>
    </div>
    
    <div id="records-container"><p class="empty-hint" style="text-align:center;padding:32px 0">尚無紀錄</p></div>
    <div class="sync-bar"><span class="sync-dot ok" id="sync-dot-rec"></span><span id="sync-label-rec">就緒</span></div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item active" id="nav-entry" onclick="switchPage('entry')"><span class="nav-icon">✏️</span>登錄</div>
    <div class="nav-item" id="nav-records" onclick="switchPage('records')"><span class="nav-icon">📄</span>紀錄<span class="badge" id="nav-badge" style="display:none">0</span></div>
    </div>
</div>

<div id="toast"></div>

<script>
window.onerror = function() { return true; };
window.addEventListener('unhandledrejection', function(e) { e.preventDefault(); });

var WD = ['日','一','二','三','四','五','六'];
var ni = new Date();
document.getElementById('date-display').textContent = ni.getFullYear()+'.'+(ni.getMonth()+1)+'.'+ni.getDate()+' ('+WD[ni.getDay()]+')';

var ENCRYPTED_DATA = 'JGHKepWRaBZbX1hGXhEhzj4wW1ixzBAcCaEZIHlM9NicfJaI+rEI72Mn238oSJ+aaVXHvA9BXbyyHMFisWhlOWZPpKJOe4MLq/R9VOk1XU0GN6+908wtIWtQtlO0Kq1DcAyg+LLD/BnpEondKsx+T9FEG/msyJsl/XK+iMoprtJxacD4IhWCN15mifKAD1ogy4eVvyC9fYdk9Coj';

function b64ToUint8(b64) {
  var bin = atob(b64);
  var arr = new Uint8Array(bin.length);
  for (var i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return arr;
}

async function decryptURL(password) {
  var raw = b64ToUint8(ENCRYPTED_DATA);
  var salt = raw.slice(0, 16);
  var iv   = raw.slice(16, 28);
  var tag  = raw.slice(28, 44);
  var ct   = raw.slice(44);

  var combined = new Uint8Array(ct.length + 16);
  combined.set(ct);
  combined.set(tag, ct.length);

  var keyMaterial = await crypto.subtle.importKey('raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']);
  var key = await crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: salt, iterations: 100000, hash: 'SHA-256' },
    keyMaterial,
    { name: 'AES-GCM', length: 256 },
    false,
    ['decrypt']
  );

  var decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, key, combined);
  return new TextDecoder().decode(decrypted);
}

var API_URL = '';
var API_TOKEN = '';

function loadSavedToken() {
  try { API_TOKEN = localStorage.getItem('cls_token') || ''; } catch(e) {}
  return !!API_TOKEN;
}

function saveToken(token) {
  try { localStorage.setItem('cls_token', token); } catch(e) {}
  API_TOKEN = token;
}

function clearToken() {
  try { localStorage.removeItem('cls_token'); } catch(e) {}
  API_TOKEN = '';
  API_URL = '';
}

async function unlockApp() {
  var password = document.getElementById('setup-token').value.trim();
  var errEl = document.getElementById('setup-error');

  if (!password || password.length < 4) {
    showSetupError('⚠️ 請輸入至少 4 個字元的密碼');
    return;
  }

  showSetupInfo('⏳ 驗證中...');

  try {
    var url = await decryptURL(password);
    if (!url.startsWith('https://')) throw new Error('bad');
    API_URL = url;
    API_TOKEN = password;

    var data = await apiGet({ action: 'getAll' });
    if (data.error === 'unauthorized') throw new Error('token');

    saveToken(password);
    enterApp();
  } catch(e) {
    if (e.message === 'token') {
      showSetupError('❌ 密碼可以解密但伺服器拒絕存取，請確認密碼');
    } else {
      showSetupError('❌ 密碼錯誤，無法解鎖');
    }
    API_URL = ''; API_TOKEN = '';
  }
}

async function tryAutoUnlock(token) {
  try {
    var url = await decryptURL(token);
    if (!url.startsWith('https://')) return false;
    API_URL = url;
    API_TOKEN = token;
    return true;
  } catch(e) { return false; }
}

function lockApp() {
  if (!confirm('確定要登出？需要重新輸入密碼。')) return;
  clearToken();
  document.getElementById('main-app').style.display = 'none';
  document.getElementById('setup-screen').style.display = 'flex';
  document.getElementById('setup-token').value = '';
  document.getElementById('setup-error').style.display = 'none';
}

function enterApp() {
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('main-app').style.display = 'block';
  // ★ 移除了綁定設定頁面的 ID，避免產生找不到元素的錯誤
  buildPicker();
  loadRecords();
}

function showSetupError(msg) {
  var el = document.getElementById('setup-error');
  el.textContent = msg; el.style.display = 'block';
  el.style.background = 'var(--red-dim)'; el.style.borderColor = 'rgba(248,81,73,.4)'; el.style.color = 'var(--red)';
}
function showSetupInfo(msg) {
  var el = document.getElementById('setup-error');
  el.textContent = msg; el.style.display = 'block';
  el.style.background = 'var(--blue-dim)'; el.style.borderColor = 'rgba(88,166,255,.4)'; el.style.color = 'var(--blue)';
}

function apiGet(params) {
  params.token = API_TOKEN;
  var url = API_URL + '?' + new URLSearchParams(params).toString();
  return fetch(url, { redirect: 'follow' }).then(function(r){return r.text()}).then(function(t){return JSON.parse(t)});
}
function apiPost(payload) {
  payload.token = API_TOKEN;
  return fetch(API_URL, { method:'POST', redirect:'follow', headers:{'Content-Type':'text/plain;charset=utf-8'}, body:JSON.stringify(payload) }).then(function(r){return r.text()}).then(function(t){return JSON.parse(t)});
}

function escapeHtml(s){if(!s)return '';var d=document.createElement('div');d.textContent=s;return d.innerHTML}
var toastTimer;
function showToast(m){var e=document.getElementById('toast');if(!e)return;e.textContent=m;e.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(function(){e.classList.remove('show')},2400)}
function setSyncState(p,s,l){var d=document.getElementById('sync-dot-'+p);var b=document.getElementById('sync-label-'+p);if(d)d.className='sync-dot '+s;if(b)b.textContent=l}

function switchPage(n){document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active')});document.querySelectorAll('.nav-item').forEach(function(i){i.classList.remove('active')});var targetPage=document.getElementById('page-'+n);if(targetPage)targetPage.classList.add('active');var targetNav=document.getElementById('nav-'+n);if(targetNav)targetNav.classList.add('active');if(n==='records')loadRecords()}

var currentTask='';
function selectTask(t){currentTask=t;document.getElementById('task-listen').className='task-card'+(t==='listen'?' sel-listen':'');document.getElementById('task-absence').className='task-card'+(t==='absence'?' sel-absence':'');document.getElementById('class-card').style.display='block';document.getElementById('listen-section').style.display=t==='listen'?'block':'none';document.getElementById('absence-section').style.display=t==='absence'?'block':'none';if(t==='listen'){listenStatus='';resetListenUI()}}

function updateClassOpts(){var s=document.getElementById('sel-school').value;var sel=document.getElementById('sel-class');if(!s){sel.innerHTML='<option value="">請先選擇年段</option>';return}var o='<option value="">請選擇班級</option>';if(s==='高中部')['甲','乙','丙','丁','戊','己','庚'].forEach(function(c){o+='<option value="'+c+'">'+c+'班</option>'});else for(var i=1;i<=10;i++)o+='<option value="'+i+'">'+i+'班</option>';sel.innerHTML=o}

var listenStatus='';
function selectListenStatus(s){listenStatus=s;document.getElementById('btn-normal').className='status-btn'+(s==='normal'?' sel-normal':'');document.getElementById('btn-abnormal').className='status-btn'+(s==='abnormal'?' sel-abnormal':'');document.getElementById('note-wrap').className='note-wrap'+(s==='abnormal'?' show':'');if(s==='normal')document.getElementById('listen-note').value=''}
function resetListenUI(){document.getElementById('btn-normal').className='status-btn';document.getElementById('btn-abnormal').className='status-btn';document.getElementById('note-wrap').className='note-wrap';document.getElementById('listen-note').value=''}

var MAX_SEAT=45,currentSeats=new Set(),allPresent=false;
function buildPicker(){var p=document.getElementById('seat-picker');p.innerHTML='';for(var i=1;i<=MAX_SEAT;i++){var b=document.createElement('button');b.className='seat-btn';b.textContent=i;b.dataset.seat=i;b.onclick=(function(n){return function(){toggleSeat(n)}})(i);p.appendChild(b)}}
function toggleSeat(n){allPresent=false;document.getElementById('all-present-notice').style.display='none';document.getElementById('present-btn').classList.remove('active');if(currentSeats.has(n))currentSeats.delete(n);else currentSeats.add(n);syncPickerUI();renderSummary()}
function syncPickerUI(){document.querySelectorAll('.seat-btn').forEach(function(b){b.classList.toggle('selected',currentSeats.has(parseInt(b.dataset.seat)))})}
function toggleAllPresent(){allPresent=!allPresent;if(allPresent){currentSeats.clear();syncPickerUI();renderSummary();document.getElementById('all-present-notice').style.display='block';document.getElementById('present-btn').classList.add('active');showToast('全班到齊，可直接提交')}else{document.getElementById('all-present-notice').style.display='none';document.getElementById('present-btn').classList.remove('active')}}
function manualAdd(){allPresent=false;document.getElementById('all-present-notice').style.display='none';document.getElementById('present-btn').classList.remove('active');var parts=document.getElementById('seat-input').value.split(/[\s,，、\/]+/).filter(Boolean);var added=0;parts.forEach(function(p){var n=parseInt(p);if(!isNaN(n)&&n>0&&n<=99&&!currentSeats.has(n)){currentSeats.add(n);if(n>MAX_SEAT){var pk=document.getElementById('seat-picker');if(!pk.querySelector('[data-seat="'+n+'"]')){var b=document.createElement('button');b.className='seat-btn selected';b.textContent=n;b.dataset.seat=n;b.onclick=(function(num){return function(){toggleSeat(num)}})(n);pk.appendChild(b)}}added++}});document.getElementById('seat-input').value='';syncPickerUI();renderSummary();showToast(added?'✅ 已加入 '+added+' 個座號':'⚠️ 未新增（重複或格式錯誤）')}
document.getElementById('seat-input').addEventListener('keydown',function(e){if(e.key==='Enter')manualAdd()});
function renderSummary(){var sorted=Array.from(currentSeats).sort(function(a,b){return a-b});document.getElementById('chips-count').textContent=sorted.length;var card=document.getElementById('summary-card');if(!sorted.length){card.style.display='none';return}card.style.display='block';document.getElementById('seat-summary').innerHTML=sorted.map(function(n){return '<div class="seat-chip">'+String(n).padStart(2,'0')+'<button class="chip-del" onclick="removeSeat('+n+')">×</button></div>'}).join('')}
function removeSeat(n){currentSeats.delete(n);syncPickerUI();renderSummary()}
function clearSeats(){currentSeats.clear();allPresent=false;document.getElementById('all-present-notice').style.display='none';document.getElementById('present-btn').classList.remove('active');document.querySelectorAll('.seat-btn').forEach(function(b){if(parseInt(b.dataset.seat)>MAX_SEAT)b.remove()});syncPickerUI();renderSummary();showToast('已清除所有座號')}

function submitRecord(){var school=document.getElementById('sel-school').value;var g=document.getElementById('sel-grade').value;var c=document.getElementById('sel-class').value;if(!currentTask){showToast('⚠️ 請先選擇任務');return}if(!school||!g||!c){showToast('⚠️ 請選擇年段、年級和班級');return}if(currentTask==='listen'){if(!listenStatus){showToast('⚠️ 請選擇正常或異常');return}if(listenStatus==='abnormal'&&!document.getElementById('listen-note').value.trim()){showToast('⚠️ 請填寫異常說明');return}}if(currentTask==='absence'&&!allPresent&&currentSeats.size===0){showToast('⚠️ 請選擇座號，或點「全班到齊」');return}var now=new Date();var rec={id:Date.now(),taskType:currentTask,className:school+g+'年'+c+'班',seats:currentTask==='absence'?Array.from(currentSeats).sort(function(a,b){return a-b}):[],allPresent:currentTask==='absence'?allPresent:false,listenStatus:currentTask==='listen'?listenStatus:'',listenNote:currentTask==='listen'?document.getElementById('listen-note').value.trim():'',date:(now.getMonth()+1)+'/'+now.getDate(),time:String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')};setSyncState('entry','loading','儲存中...');apiPost({action:'add',record:rec}).then(function(data){if(data.error==='unauthorized')throw new Error('unauthorized');if(!data.ok)throw new Error('not ok');setSyncState('entry','ok','已同步到試算表');showToast('🎉 '+rec.className+' 登錄完成！');if(currentTask==='absence')clearSeats();if(currentTask==='listen'){listenStatus='';resetListenUI()}return loadRecords()}).catch(function(e){if(e.message==='unauthorized'){setSyncState('entry','error','金鑰驗證失敗');showToast('❌ 金鑰錯誤')}else{setSyncState('entry','error','儲存失敗');showToast('❌ 儲存失敗，請確認連線')}})}

var records=[], currentFilter='all', filterDate='all', filterSchool='all', filterGrade='all';

function updateDateOptions() {
    var dateSet = new Set();
    records.forEach(function(r) { if(r.date) dateSet.add(r.date); });
    var sortedDates = Array.from(dateSet).sort().reverse(); 
    var sel = document.getElementById('filter-date');
    var html = '<option value="all">全部日期</option>';
    sortedDates.forEach(function(d) {
        var display = d;
        if(d.indexOf('T') > -1) {
            var pd = new Date(d);
            if(!isNaN(pd)) display = (pd.getMonth()+1) + '/' + pd.getDate();
        }
        html += '<option value="' + d + '">' + escapeHtml(display) + '</option>';
    });
    var currentVal = filterDate;
    sel.innerHTML = html;
    if(dateSet.has(currentVal)) { sel.value = currentVal; } 
    else { filterDate = 'all'; }
}

function loadRecords(){
  setSyncState('rec','loading','載入中...');
  return apiGet({action:'getAll'}).then(function(data){
    if(data.error==='unauthorized')throw new Error('unauthorized');
    records=data.records||[];
    updateDateOptions();
    renderRecords();
    updateBadge();
    setSyncState('rec','ok','已更新，共 '+records.length+' 筆');
  }).catch(function(e){
    if(e.message==='unauthorized')setSyncState('rec','error','金鑰驗證失敗');
    else setSyncState('rec','error','載入失敗');
  })
}

function setFilter(f){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(function(b){b.className='filter-btn'});
  var cls={all:'fa',listen:'fl',absence:'fx'};
  document.getElementById('filter-'+f).classList.add(cls[f]);
  renderRecords();
}

function setSubFilter(type, val) {
  if (type === 'date') filterDate = val;
  if (type === 'school') filterSchool = val;
  if (type === 'grade') filterGrade = val;
  renderRecords();
}

function getFilteredRecords() {
  return records.filter(function(r) {
    if (currentFilter !== 'all' && r.taskType !== currentFilter) return false;
    if (filterDate !== 'all' && r.date !== filterDate) return false;
    if (filterSchool !== 'all' && !r.className.startsWith(filterSchool)) return false;
    if (filterGrade !== 'all' && r.className.indexOf(filterGrade + '年') === -1) return false;
    return true;
  });
}

function renderRecords(){
  var list = getFilteredRecords();
  
  document.getElementById('stat-total').textContent = list.length;
  document.getElementById('stat-listen').textContent = list.filter(function(r){return r.taskType==='listen'}).length;
  document.getElementById('stat-absence').textContent = list.filter(function(r){return r.taskType==='absence'}).length;
  
  var ct=document.getElementById('records-container');
  if(!list.length){
    ct.innerHTML='<p class="empty-hint" style="text-align:center;padding:32px 0">無符合篩選的紀錄</p>';
    return;
  }
  
  ct.innerHTML = list.map(function(r){
    var isL=r.taskType==='listen';
    var tag='<span class="rec-tag '+(isL?'tl':'ta')+'">'+(isL?'英聽':'缺考')+'</span>';
    var body='';
    if(isL){
      body=r.listenStatus==='normal'?'<div class="listen-ok">✓ 設備正常</div>':'<div class="listen-err">✗ 設備異常</div>'+(r.listenNote?'<div class="listen-note-text">'+escapeHtml(r.listenNote)+'</div>':'')
    } else {
      body='<div class="rec-seats">'+(r.seats.length===0?'<span style="color:var(--green);font-size:13px;font-weight:700">✓ 全班到齊</span>':r.seats.map(function(s){return '<span class="mini-chip">'+String(s).padStart(2,'0')+'</span>'}).join(''))+'</div>'
    }
    var count=isL?(r.listenStatus==='normal'?'設備正常':'設備異常'):(r.seats.length===0?'無人缺考':'缺考 '+r.seats.length+' 人');
    return '<div class="record-item"><div class="rec-header"><span class="rec-class">'+tag+escapeHtml(r.className)+'</span><span class="rec-time">'+escapeHtml(r.date+' '+r.time)+'</span></div><div class="rec-body">'+body+'</div><div class="rec-footer"><span class="rec-count">'+count+'</span><div class="rec-btns"><button class="rec-btn copy" onclick="copyRecord('+r.id+')">複製</button><button class="rec-btn del" onclick="deleteRecord('+r.id+')">刪除</button></div></div></div>'
  }).join('')
}

function deleteRecord(id){setSyncState('rec','loading','刪除中...');apiPost({action:'delete',id:id}).then(function(){showToast('已刪除');return loadRecords()}).catch(function(){showToast('❌ 刪除失敗')})}

function clearAllRecords(){
  if(!records.length){showToast('沒有紀錄可清除');return}
  if(!confirm('確定要清除全部 '+records.length+' 筆紀錄？\n⚠️ 注意：此操作會清除雲端所有紀錄，無視當前的篩選狀態！'))return;
  setSyncState('rec','loading','清除中...');
  apiPost({action:'clear'}).then(function(){showToast('已清除全部紀錄');return loadRecords()}).catch(function(){showToast('❌ 清除失敗')})
}

function copyRecord(id){var r=records.find(function(x){return x.id==id});if(!r)return;var t='【'+(r.taskType==='listen'?'英聽測試':'缺考登錄')+'】\n班級：'+r.className+'\n';if(r.taskType==='listen'){t+='設備狀態：'+(r.listenStatus==='normal'?'正常':'異常');if(r.listenNote)t+='\n異常說明：'+r.listenNote}else{var s=r.seats.length===0?'無（全班到齊）':r.seats.map(function(s){return String(s).padStart(2,'0')}).join('、');t+='缺考座號：'+s+'\n缺考人數：'+r.seats.length+' 人'}copyText(t+'\n時間：'+r.date+' '+r.time)}

function copyAll(){
  var list = getFilteredRecords();
  if(!list.length){showToast('沒有紀錄可複製');return}
  var d=(new Date().getMonth()+1)+'/'+new Date().getDate();
  var lines=['📋 登錄紀錄彙整（'+d+'）\n'+'─'.repeat(18)];
  list.forEach(function(r,i){
    var detail=r.taskType==='listen'?(r.listenStatus==='normal'?'設備正常':'設備異常：'+(r.listenNote||'（無說明）')):(r.seats.length===0?'全班到齊（無人缺考）':'缺考：'+r.seats.map(function(s){return String(s).padStart(2,'0')}).join('、')+'（共'+r.seats.length+'人）');
    lines.push((i+1)+'. ['+(r.taskType==='listen'?'英聽':'缺考')+'] '+r.className+'\n   '+detail)
  });
  copyText(lines.join('\n'))
}

function copyText(t){if(navigator.clipboard){navigator.clipboard.writeText(t).then(function(){showToast('✅ 已複製到剪貼簿')}).catch(function(){})}else{var ta=document.createElement('textarea');ta.value=t;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('✅ 已複製到剪貼簿')}}
function updateBadge(){var b=document.getElementById('nav-badge');if(!b)return;if(!records.length){b.style.display='none';return}b.style.display='inline-flex';b.textContent=records.length}

(async function init() {
  if (loadSavedToken()) {
    var ok = await tryAutoUnlock(API_TOKEN);
    if (ok) { enterApp(); return; }
  }
  document.getElementById('setup-screen').style.display = 'flex';
  document.getElementById('setup-token').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') unlockApp();
  });
})();
</script>
</body>
